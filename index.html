<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Faculty Profile</title>
    <link rel="stylesheet" href="pjicon.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" integrity="sha512-Kc323vGBEqzTmouAECnVceyQqyqdsSiqLQISBL29aUW4U/M7pSPA/gEUZQqv1cwx4OnYxTxve5UMg5GT6L4JJg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap">
    <style>
        .navbar {
            display: flex;
            background-color: darkblue;
            padding: 30px;
            justify-content: center;
            text-align: center;
        }

        .navbar a {
            color: white;
            text-decoration: none;
            font-weight: bold;
            font-family: 'Roboto', sans-serif;
            padding: 10px;
            display: block;
        }

        .navbar a:hover {
            background-color: #ddd;
            color: darkblue;
        }

        #search {
            display: flex;
            align-items: center;
        }

        #search i {
            margin-right: 8px;
        }

        .image-container {
            position: relative;
            width: 100%;
            height: 700px;
            background-image: url('https://media.istockphoto.com/id/539018591/photo/harvard-moors-hall.jpg?s=612x612&w=0&k=20&c=gnKcGqWT2HGi34uPTOMWyr-0oc-Tcpq9-Cg5mHF82f0=');
            background-size: cover;
            background-position: center;
        }

        .overlay-text {
            position: absolute;
            top: 50%; /* Center vertically */
            left: 75%; /* Center horizontally */
            transform: translate(-50%, -50%);
            color: white;
            font-size: 48px;
            font-weight: bold;
            background-color: rgba(0, 0, 0, 0.5); /* Semi-transparent background */
            padding: 15px 30px;
            border-radius: 8px;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- Navigation Bar -->
    <nav>
        <div class="navbar">
            <a href="#Home">Home</a>
            <a href="about us">About Us</a> 
            <a href="leaders">Our Leaders</a>
            <a id="search" href="faculty.html"><i class="fa fa-search"></i> Faculty Search</a>
        </div>
    </nav>

    <!-- Image Section with Text Overlay -->
    <div class="image-container">
        <div class="overlay-text">Faculty Profile</div>
    </div>
</body>
</html>
